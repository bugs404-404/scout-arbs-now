server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy backend API + WebSocket through THIS nginx so the browser
  # only ever talks to one origin. Cloudflare Tunnel can then publish a
  # single public hostname → port 3000 of this container.
  #
  # `dashboard-api` is the docker-compose service name on the shared network.

  location /api/ {
    proxy_pass         http://dashboard-api:8000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /ws/ {
    proxy_pass         http://dashboard-api:8000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;   # WS sessions stay open
  }

  # Cache hashed assets aggressively — the content hash in the filename
  # means any change ships under a new URL, so a long cache is safe.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback: any non-asset, non-api path serves index.html so client-
  # side routing handles /live-arbs, /bet-tracker, etc. on direct hits.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Avoid caching the shell HTML — must always pick up the latest assets/*
  location = /index.html {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
