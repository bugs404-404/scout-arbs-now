server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache hashed assets aggressively — content-hash in the filename means
  # any change ships under a new URL, so a long cache is safe.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback: any non-asset path serves index.html so client-side
  # routing handles /live-arbs, /bet-tracker, etc. on direct hits and reloads.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Avoid caching the shell HTML — must always pick up the latest assets/*
  location = /index.html {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
